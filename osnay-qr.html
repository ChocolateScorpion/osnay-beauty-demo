<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Osnay Beauty — QR de reserva</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0e0a0c;
      --dark:  #150f12;
      --rose:  #c97b8a;
      --rose-light: #e8b4be;
      --cream: #f5ecea;
      --muted: #8a787c;
      --border: rgba(201,123,138,.22);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Jost', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--sans);
      color: var(--cream);
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 52px 48px 44px;
      max-width: 400px; width: 92vw;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--rose);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .logo {
      font-family: var(--serif);
      font-size: 22px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--rose);
    }
    .logo em { font-style: italic; color: var(--cream); }

    .tag {
      font-size: 9px; letter-spacing: .32em; text-transform: uppercase;
      color: var(--muted);
    }

    .qr-wrap {
      background: #fff;
      padding: 16px;
      display: inline-block;
      position: relative;
    }
    .qr-wrap img { display: block; width: 200px; height: 200px; }

    /* Rose overlay corners on QR */
    .qr-wrap::before, .qr-wrap::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--rose);
      border-style: solid;
    }
    .qr-wrap::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
    .qr-wrap::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

    .headline {
      font-family: var(--serif);
      font-size: 30px; font-weight: 400;
      line-height: 1.15;
    }
    .headline em { font-style: italic; color: var(--rose); }

    .url-box {
      width: 100%;
      border: 1px solid var(--border);
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
    }
    .url-box span {
      font-size: 12px; color: var(--muted); letter-spacing: .04em;
      word-break: break-all;
    }
    .url-box a {
      color: var(--rose); text-decoration: none; font-size: 12px;
    }

    .note {
      font-size: 11px; color: var(--muted); line-height: 1.7;
      max-width: 280px;
    }

    .divider {
      width: 40px; height: 1px; background: var(--border);
    }

    .services-row {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .svc-tag {
      font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 5px 12px; color: var(--muted);
    }

    .print-btn {
      margin-top: 8px;
      font-family: var(--sans);
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      padding: 12px 28px;
      border: 1px solid var(--rose); color: var(--rose);
      background: none; cursor: pointer;
      transition: background .3s, color .3s;
    }
    .print-btn:hover { background: var(--rose); color: var(--black); }

    @media print {
      body { background: #fff; }
      .card { border-color: #ddd; background: #fff; color: #1a1a1a; }
      .logo, .headline em { color: #c97b8a; }
      .print-btn { display: none; }
    }

    /* URL editable highlight */
    #url-display { color: var(--rose-light); }
  </style>
</head>
<body>

<div class="card">
  <div>
    <div class="logo">Osnay <em>Beauty</em></div>
    <div class="tag" style="margin-top:6px;">Studio Spa · Portales Sur · CDMX</div>
  </div>

  <div class="qr-wrap" id="qr-container">
    <!-- QR se genera dinámicamente -->
    <img id="qr-img" src="" alt="QR Osnay Beauty">
  </div>

  <div>
    <div class="headline">Agenda tu cita<br><em>en línea</em></div>
  </div>

  <div class="divider"></div>

  <div class="services-row">
    <span class="svc-tag">Lash Lifting</span>
    <span class="svc-tag">Pestañas</span>
    <span class="svc-tag">Uñas</span>
    <span class="svc-tag">Cabello</span>
  </div>

  <div class="url-box">
    <span>🔗</span>
    <a id="url-link" href="#" target="_blank"><span id="url-display"></span></a>
  </div>

  <p class="note">Escanea el código y agenda tu cita directamente desde tu teléfono. Sin llamadas, sin esperas.</p>

  <button class="print-btn" onclick="window.print()">
    Imprimir / Guardar PDF
  </button>
</div>

<script>
  // ── Configura aquí la URL de tu página ──────────────
  // Cuando tengas tu enlace de Vercel o dominio, reemplázalo aquí:
  const LANDING_URL = (() => {
    const params = new URLSearchParams(window.location.search);
    return params.get('url') || 'https://osnay-beauty-demo.vercel.app/';
  })();

  // Set URL display
  document.getElementById('url-display').textContent = LANDING_URL;
  document.getElementById('url-link').href = LANDING_URL;

  // Generate QR using free API (no registration needed)
  const qrSize = 400;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(LANDING_URL)}&color=0e0a0c&bgcolor=ffffff&margin=10&ecc=M`;
  document.getElementById('qr-img').src = qrUrl;
  document.getElementById('qr-img').onerror = () => {
    // Fallback if API unavailable
    document.getElementById('qr-img').alt = 'Conecta a internet para generar el QR';
  };
</script>
</body>
</html>
